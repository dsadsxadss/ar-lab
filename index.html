<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Poster Lab</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar-nft.js"></script>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#startBtn{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:18px 28px;
font-size:18px;
background:black;
color:white;
border:none;
border-radius:10px;
z-index:999;
}
</style>
</head>

<body>

<button id="startBtn">Запустить AR</button>

<a-scene
id="scene"
embedded
vr-mode-ui="enabled:false"
renderer="logarithmicDepthBuffer:true;"
arjs="trackingMethod:best; sourceType:webcam; debugUIEnabled:false;"
style="display:none;"
>

<a-assets>

<video
id="video"
src="video.mp4"
loop
webkit-playsinline
playsinline
crossorigin="anonymous">
</video>

</a-assets>

<!-- NFT IMAGE TRACKING -->
<a-nft
type="nft"
url="trigger/image"
smooth="true"
smoothCount="10"
smoothTolerance="0.01"
smoothThreshold="5"
>

<!-- ================= LOGO ================= -->
<a-entity id="logo" position="0 1 0" scale="0 0 0">

<!-- кольцо -->
<a-torus
radius="0.5"
radius-tubular="0.05"
color="#00FFD0">
</a-torus>

<!-- центральный элемент -->
<a-box
depth="0.15"
height="0.3"
width="0.3"
color="#111"
position="0 0 0.1">
</a-box>

</a-entity>

<!-- ================= VIDEO ================= -->
<a-video
id="videoPlane"
src="#video"
width="2"
height="1.2"
position="0 0 0">
</a-video>

</a-nft>

<a-entity camera></a-entity>

</a-scene>

<script>

const btn = document.getElementById("startBtn");
const scene = document.getElementById("scene");
const video = document.getElementById("video");
const logo = document.getElementById("logo");

btn.onclick = () => {
btn.style.display="none";
scene.style.display="block";
};

const nft = document.querySelector("a-nft");

nft.addEventListener("markerFound", () => {

video.pause();
video.currentTime = 0;

video.play().catch(()=>{});

// появление логотипа
logo.setAttribute("animation__scalein",{
property:"scale",
to:"1 1 1",
dur:2000,
easing:"easeOutElastic"
});

// вращение
logo.setAttribute("animation__rotate",{
property:"rotation",
to:"0 360 0",
loop:true,
dur:4000,
easing:"linear"
});

// исчезновение через 5 сек
setTimeout(()=>{
logo.setAttribute("animation__scaleout",{
property:"scale",
to:"0 0 0",
dur:1500
});
},5000);

});

</script>

</body>
</html>
