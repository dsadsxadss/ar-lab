<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Poster</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar-nft.js"></script>

<style>
body { margin:0; overflow:hidden; }

#startBtn{
position:fixed;
top:50%;
left:50%;
left:50%;
transform:translate(-50%,-50%);
padding:20px 30px;
font-size:20px;
background:black;
color:white;
border:none;
border-radius:10px;
z-index:999;
}
</style>
</head>

<body>

<button id="startBtn">Запустить AR</button>

<a-scene
id="scene"
embedded
vr-mode-ui="enabled:false"
renderer="logarithmicDepthBuffer:true;"
arjs="trackingMethod: best;"
style="display:none;"
>

<a-assets>
<video id="vid" src="video.mp4"
preload="auto"
loop
webkit-playsinline
playsinline
crossorigin="anonymous">
</video>

<img id="logo" src="logo.png">
</a-assets>

<!-- IMAGE TRACKING -->
<a-nft
type="nft"
url="trigger"
smooth="true"
smoothCount="10"
smoothTolerance="0.01"
smoothThreshold="5"
>

<!-- LOGO -->
<a-image
id="logo3d"
src="#logo"
position="0 1 0"
width="1.5"
height="1"
opacity="0"
animation__fadein="property: opacity; to:1; dur:2000; startEvents:showLogo"
animation__fadeout="property: opacity; to:0; dur:2000; startEvents:hideLogo">
</a-image>

<!-- VIDEO -->
<a-video
id="videoPlane"
src="#vid"
width="2"
height="1.2"
position="0 0 0">
</a-video>

</a-nft>

<a-entity camera></a-entity>
</a-scene>

<script>
const btn = document.getElementById("startBtn");
const scene = document.getElementById("scene");
const video = document.querySelector("#vid");
const logo = document.querySelector("#logo3d");

btn.onclick = () => {
btn.style.display="none";
scene.style.display="block";
};

document.querySelector("a-nft")
.addEventListener("markerFound", () => {

logo.emit("showLogo");

setTimeout(()=>{
logo.emit("hideLogo");
video.play();
},5000);

});
</script>

</body>
</html>
