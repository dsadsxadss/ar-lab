<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Poster Test</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>
</head>

<body>

<a-scene embedded vr-mode-ui="enabled:false" renderer="logarithmicDepthBuffer:true;">

  <a-assets>
    <video id="vid" src="video.mp4" autoplay loop muted playsinline webkit-playsinline crossorigin="anonymous"></video>
  </a-assets>

  <!-- 3D LOGO -->
  <a-entity id="logo3d" position="0 1 0" scale="0 0 0">
    <a-torus color="#00FFD0" radius="0.4" radius-tubular="0.05"></a-torus>
    <a-box color="#111111" depth="0.1" height="0.3" width="0.3" position="0 0 0.1"></a-box>
  </a-entity>

  <!-- VIDEO -->
  <a-video id="videoPlane" src="#vid" width="2" height="1.2" position="0 0 0"></a-video>

  <a-entity camera position="0 1.6 3"></a-entity>

</a-scene>

<script>
const video = document.getElementById("vid");
const logo = document.getElementById("logo3d");

// Попытка воспроизвести видео
video.play().catch(() => console.log("Video autoplay blocked"));

// Анимация появления логотипа
logo.setAttribute("animation__scalein", {
  property: "scale",
  to: "1 1 1",
  dur: 2000,
  easing: "easeOutElastic"
});

// Вращение логотипа
logo.setAttribute("animation__rotate", {
  property: "rotation",
  to: "0 360 0",
  loop: true,
  dur: 4000
});

// Через 5 секунд логотип исчезает
setTimeout(()=>{
  logo.setAttribute("animation__scaleout", {
    property:"scale",
    to:"0 0 0",
    dur:1500
  });
},5000);
</script>

</body>
</html>
