<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Video</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>

<body>

<a-scene 
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true;"
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
>

    <a-assets>
        <video 
            id="video"
            src="video.mp4"
            preload="auto"
            response-type="arraybuffer"
            loop="false"
            crossorigin="anonymous"
            webkit-playsinline
            playsinline>
        </video>
    </a-assets>

    <!-- Маркер -->
    <a-marker type="pattern" url="trigger.patt">

        <!-- 3D ЛОГО -->
        <a-box 
            position="0 0.5 0"
            scale="0.5 0.5 0.5"
            color="#FF0055"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 2000">
        </a-box>

        <a-text 
            value="DESIGN"
            position="-0.7 1 0"
            scale="1 1 1"
            color="#ffffff"
            animation="property: position; to: -0.7 1.2 0; dir: alternate; loop: true; dur: 1000">
        </a-text>

        <!-- Видео -->
        <a-video
            src="#video"
            width="1.6"
            height="0.9"
            position="0 0 0"
            rotation="-90 0 0">
        </a-video>

    </a-marker>

    <a-entity camera></a-entity>

</a-scene>

<script>
document
.querySelector("a-marker")
.addEventListener("markerFound", function () {
    const video = document.querySelector("#video");
    video.play();
});

document
.querySelector("a-marker")
.addEventListener("markerLost", function () {
    const video = document.querySelector("#video");
    video.pause();
});
</script>

</body>
</html>
