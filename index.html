<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<style>
body { margin:0; overflow:hidden; }
</style>

</head>

<body>

<a-scene
embedded
vr-mode-ui="enabled: false"
renderer="logarithmicDepthBuffer: true;"
arjs="sourceType: webcam; debugUIEnabled: false;"
>

<a-assets>
<video
id="video"
src="video.mp4"
preload="auto"
autoplay
muted
loop="false"
playsinline
webkit-playsinline
crossorigin="anonymous">
</video>
</a-assets>

<a-marker preset="custom" type="pattern" url="trigger.patt" id="marker">

<!-- 3D LOGO -->
<a-entity id="logo" position="0 0.5 0">

<a-torus
radius="0.4"
radius-tubular="0.05"
color="#00ffff"
rotation="90 0 0"
animation="property: rotation; to: 90 360 0; loop: true; dur: 2000">
</a-torus>

<a-text
value="DESIGN"
align="center"
color="white"
position="0 0 0"
scale="1 1 1">
</a-text>

</a-entity>

<!-- VIDEO -->
<a-video
id="videoPlane"
src="#video"
position="0 0 0"
rotation="-90 0 0"
width="1.6"
height="0.9"
visible="false">
</a-video>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>

const marker = document.querySelector("#marker")
const video = document.querySelector("#video")
const videoPlane = document.querySelector("#videoPlane")
const logo = document.querySelector("#logo")

marker.addEventListener("markerFound", () => {

logo.setAttribute("visible", true)

setTimeout(()=>{

logo.setAttribute("visible", false)
videoPlane.setAttribute("visible", true)

video.currentTime = 0
video.play()

},1500)

})

marker.addEventListener("markerLost", ()=>{

video.pause()
video.currentTime = 0

videoPlane.setAttribute("visible", false)
logo.setAttribute("visible", true)

})

</script>

</body>
</html>
